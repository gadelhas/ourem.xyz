name: Update Bewater Interruptions

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    paths:
      - 'bewater/fetch_interruptions.py'

jobs:
  update-bewater:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Bewater interruptions
        run: python3 bewater/fetch_interruptions.py

      - name: Commit and push if changed
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add bewater/interruptions.json bewater/interruptions_history.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Bewater water service interruptions" && git push)
