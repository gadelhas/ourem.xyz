name: Update Pool Schedule

on:
  schedule:
    # Run every day at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    paths:
      - 'MGO-PIscinas-202526-TF.pdf'
      - 'extract_schedule.py'

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract schedule from PDF
        run: python3 extract_schedule.py

      - name: Commit and push if changed
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add schedule.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update pool schedule data" && git push)
