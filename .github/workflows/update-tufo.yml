name: Update TUFO Schedules

on:
  schedule:
    # Run daily at 3 AM UTC to check for schedule updates
    - cron: '0 3 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    paths:
      - 'tufo/fetch_schedules.py'

jobs:
  update-tufo:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch TUFO schedules from API
        run: |
          cd tufo
          python3 fetch_schedules.py

      - name: Commit and push if changed
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add tufo/schedules.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update TUFO transport schedules" && git push)
